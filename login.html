<!DOCTYPE html>
<html lang="en" ng-app="HealthApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="app.js"></script>
  <title>Doctor Login — Seva Health</title>
  <style>
    body {
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Top brand mark */
    .brand-mark {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 64px; height: 64px;
      background: var(--gradient);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(76,175,142,0.30);
    }
    .brand-mark h1 { font-size: 1.7rem; margin-bottom: 4px; }
    .brand-mark p { font-size: 0.88rem; color: var(--text-light); margin: 0; }

    /* Login card */
    .login-card {
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 40px 32px;
      box-shadow: var(--shadow-md);
    }

    .login-card h2 {
      font-family: 'Lora', serif;
      font-size: 1.25rem;
      color: var(--text-dark);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .login-card .sub {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 26px;
      text-align: left;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .field-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 15px;
      border-radius: var(--radius-sm);
      border: 1.5px solid rgba(76,175,142,0.28);
      background: var(--off-white);
      font-size: 0.93rem;
      color: var(--text-dark);
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(76,175,142,0.13);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      font-size: 0.95rem;
      border-radius: var(--radius-sm);
      background: var(--gradient);
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(76,175,142,0.28);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(76,175,142,0.35);
      filter: brightness(1.05);
    }

    .error-box {
      background: #FFF0F0;
      border: 1px solid #FFCCCC;
      color: #C53030;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-top: 14px;
      text-align: center;
    }

    .back-link {
      margin-top: 18px;
      font-size: 0.87rem;
      color: var(--text-light);
      text-align: center;
    }
    .back-link a {
      color: var(--mint);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body ng-controller="MainController">

  <div class="login-wrapper">

    <div class="brand-mark">
      <div class="brand-icon">🩺</div>
      <h1>Seva Health</h1>
      <p>Online Health Wallet</p>
    </div>

    <div class="login-card">
      <h2>Doctor Sign In</h2>
      <p class="sub">Access the patient management portal</p>

      <form ng-submit="login()">
        <div class="field-group">
          <div>
            <label class="field-label">Username</label>
            <input type="text" ng-model="username" placeholder="Enter your username" required>
          </div>
          <div>
            <label class="field-label">Password</label>
            <input type="password" ng-model="password" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="login-btn" ng-disabled="loading">
          {{ loading ? 'Signing in…' : 'Sign In' }}
        </button>

        <div class="error-box" ng-if="errorMessage">{{ errorMessage }}</div>
      </form>
    </div>

    <p class="back-link">
      Not a doctor? <a href="client.html">Register as a patient</a> &nbsp;|&nbsp;
      <a href="index.html">Back to Home</a>
    </p>

  </div>

  <footer>
    <b>Copyright © 2026 Digital Health Wallet. All rights reserved.</b><br>
    📍 SVKM's NMIMS, Shirpur.
  </footer>

</body>
</html>
